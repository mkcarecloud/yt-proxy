name: Fetch YouTube Audio Stream URL with yt-dlp
on:
  repository_dispatch:
    types: [fetch-stream]
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Search YouTube
        env:
          QUERY: ${{ github.event.client_payload.query }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || 'default' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$QUERY" ]; then
            echo "Error: No query provided"
            exit 1
          fi

          echo "Query: $QUERY"
          echo "Request ID: $REQUEST_ID"

          ENCODED_QUERY=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['QUERY']))")

          # Search with videoEmbeddable=true filter
          RESULT=$(curl -s \
            "https://www.googleapis.com/youtube/v3/search?part=snippet&q=${ENCODED_QUERY}&type=video&videoCategoryId=10&maxResults=5&videoEmbeddable=true&key=$YOUTUBE_API_KEY")

          echo "API Response: $RESULT"

          # Pick first embeddable result
          VIDEO_ID=$(echo "$RESULT" | jq -r '.items[0].id.videoId')
          TITLE=$(echo "$RESULT"    | jq -r '.items[0].snippet.title')
          THUMBNAIL=$(echo "$RESULT"| jq -r '.items[0].snippet.thumbnails.high.url')
          CHANNEL=$(echo "$RESULT"  | jq -r '.items[0].snippet.channelTitle')

          if [ -z "$VIDEO_ID" ] || [ "$VIDEO_ID" = "null" ]; then
            echo "No embeddable video found"
            jq -n \
              --arg q "$QUERY" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, status: "no_video_found", ts: $ts}' \
              > data/stream.json
          else
            echo "Found embeddable video: $TITLE ($VIDEO_ID)"
            jq -n \
              --arg q "$QUERY" \
              --arg vid "$VIDEO_ID" \
              --arg tit "$TITLE" \
              --arg thumb "$THUMBNAIL" \
              --arg channel "$CHANNEL" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_id: $vid, title: $tit, thumbnail: $thumb, channel: $channel, status: "ok", ts: $ts}' \
              > data/stream.json
          fi

      - name: Commit result to repo
        run: |
          git config user.name "yt-proxy-bot"
          git config user.email "bot@github.com"
          git add data/stream.json
          git diff --staged --quiet || git commit -m "stream: ${{ github.event.client_payload.query || 'query' }}"
          git push

      - name: Debug - show final json
        run: cat data/stream.json || echo "No stream.json written"
