name: Fetch YouTube Audio Stream URL with yt-dlp

on:
  repository_dispatch:
    types: [fetch-stream]

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg
          pip3 install --upgrade yt-dlp

      - name: Extract audio stream URL
        env:
          QUERY: ${{ github.event.client_payload.query }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || 'default' }}

        run: |
          if [ -z "$QUERY" ]; then
            echo "Error: No query provided in dispatch payload"
            exit 1
          fi

          echo "Query: $QUERY"
          echo "Request ID: $REQUEST_ID"

          # Step 1: Search YouTube → get best matching video URL
          # yt-dlp can search directly and give the first result's URL
          VIDEO_URL=$(yt-dlp --flat-playlist --print url --match-filter "duration < 2400" "ytsearch1:$QUERY" 2>/dev/null | head -n 1)

          if [ -z "$VIDEO_URL" ]; then
            echo "No video found for query: $QUERY"
            jq -n --arg q "$QUERY" --arg rid "$REQUEST_ID" --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, status: "no_video_found", ts: $ts}' > data/stream.json
            exit 0
          fi

          echo "Found video: $VIDEO_URL"

          # Step 2: Get best audio-only direct URL (m4a / opus / webm audio)
          # Prefer format 140 (m4a ~128-256k), fallback to bestaudio
          STREAM_URL=$(yt-dlp \
            --get-url \
            -f "140/bestaudio/best[ext=m4a]/bestaudio[ext=webm]/bestaudio" \
            --no-playlist \
            --no-download-archive \
            --no-warnings \
            "$VIDEO_URL" 2>/dev/null | head -n 1)

          if [ -z "$STREAM_URL" ]; then
            echo "Failed to extract audio stream URL"
            jq -n --arg q "$QUERY" --arg vid "$VIDEO_URL" --arg rid "$REQUEST_ID" --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_url: $vid, status: "extraction_failed", ts: $ts}' > data/stream.json
          else
            echo "Stream URL extracted: $STREAM_URL"

            # Optional: Get title & other info
            TITLE=$(yt-dlp --get-title "$VIDEO_URL" 2>/dev/null || echo "Unknown")

            jq -n \
              --arg q "$QUERY" \
              --arg vid "$VIDEO_URL" \
              --arg url "$STREAM_URL" \
              --arg tit "$TITLE" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_url: $vid, stream_url: $url, title: $tit, status: "ok", ts: $ts}' \
              > data/stream.json
          fi

      - name: Commit result to repo
        run: |
          git config user.name "yt-proxy-bot"
          git config user.email "bot@github.com"
          git add data/stream.json
          git diff --staged --quiet || git commit -m "stream: ${{ github.event.client_payload.query || 'query' }} (yt-dlp)"
          git push

      - name: Debug - show final json
        run: cat data/stream.json || echo "No stream.json written"
