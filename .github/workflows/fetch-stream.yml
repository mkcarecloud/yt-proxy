name: Fetch YouTube Audio Stream URL with yt-dlp
on:
  repository_dispatch:
    types: [fetch-stream]
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip ffmpeg
          pip3 install --upgrade yt-dlp

      - name: Extract audio stream URL
        env:
          QUERY: ${{ github.event.client_payload.query }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || 'default' }}
        run: |
          if [ -z "$QUERY" ]; then
            echo "Error: No query provided in dispatch payload"
            exit 1
          fi

          echo "Query: $QUERY"
          echo "Request ID: $REQUEST_ID"

          write_error() {
            local status="$1"
            local vid="${2:-}"
            jq -n \
              --arg q "$QUERY" \
              --arg rid "$REQUEST_ID" \
              --arg vid "$vid" \
              --arg s "$status" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_url: $vid, status: $s, ts: $ts}' \
              > data/stream.json
          }

          # ── Step 1: Search YouTube ──────────────────────────────────────
          echo "Searching YouTube..."
          VIDEO_URL=$(yt-dlp \
            --flat-playlist \
            --print url \
            --match-filter "duration < 2400" \
            --extractor-args "youtube:player_client=android" \
            "ytsearch1:$QUERY" 2>/dev/null | head -n 1)

          if [ -z "$VIDEO_URL" ]; then
            echo "No video found for query: $QUERY"
            write_error "no_video_found"
            exit 0
          fi

          echo "Found video: $VIDEO_URL"

          # ── Step 2: Try extraction with multiple player clients ─────────
          STREAM_URL=""

          # Attempt 1: android client (most reliable for audio)
          echo "Attempt 1: android player client..."
          STREAM_URL=$(yt-dlp \
            --get-url \
            -f "bestaudio[ext=m4a]/bestaudio[ext=webm]/bestaudio" \
            --extractor-args "youtube:player_client=android" \
            --no-playlist \
            --no-warnings \
            "$VIDEO_URL" 2>/dev/null | head -n 1)

          # Attempt 2: ios client
          if [ -z "$STREAM_URL" ]; then
            echo "Attempt 2: ios player client..."
            STREAM_URL=$(yt-dlp \
              --get-url \
              -f "bestaudio[ext=m4a]/bestaudio[ext=webm]/bestaudio" \
              --extractor-args "youtube:player_client=ios" \
              --no-playlist \
              --no-warnings \
              "$VIDEO_URL" 2>/dev/null | head -n 1)
          fi

          # Attempt 3: tv_embedded client
          if [ -z "$STREAM_URL" ]; then
            echo "Attempt 3: tv_embedded player client..."
            STREAM_URL=$(yt-dlp \
              --get-url \
              -f "bestaudio[ext=m4a]/bestaudio[ext=webm]/bestaudio" \
              --extractor-args "youtube:player_client=tv_embedded" \
              --no-playlist \
              --no-warnings \
              "$VIDEO_URL" 2>/dev/null | head -n 1)
          fi

          # Attempt 4: web client, any format
          if [ -z "$STREAM_URL" ]; then
            echo "Attempt 4: web client, best format..."
            STREAM_URL=$(yt-dlp \
              --get-url \
              -f "best" \
              --extractor-args "youtube:player_client=web" \
              --no-playlist \
              --no-warnings \
              "$VIDEO_URL" 2>/dev/null | head -n 1)
          fi

          # ── Step 3: Write result ────────────────────────────────────────
          if [ -z "$STREAM_URL" ]; then
            echo "All extraction attempts failed"
            write_error "extraction_failed" "$VIDEO_URL"
          else
            echo "Stream URL extracted successfully"
            TITLE=$(yt-dlp \
              --get-title \
              --extractor-args "youtube:player_client=android" \
              --no-warnings \
              "$VIDEO_URL" 2>/dev/null || echo "Unknown")

            jq -n \
              --arg q "$QUERY" \
              --arg vid "$VIDEO_URL" \
              --arg url "$STREAM_URL" \
              --arg tit "$TITLE" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_url: $vid, stream_url: $url, title: $tit, status: "ok", ts: $ts}' \
              > data/stream.json
          fi

      - name: Commit result to repo
        run: |
          git config user.name "yt-proxy-bot"
          git config user.email "bot@github.com"
          git add data/stream.json
          git diff --staged --quiet || git commit -m "stream: ${{ github.event.client_payload.query || 'query' }} (yt-dlp)"
          git push

      - name: Debug - show final json
        run: cat data/stream.json || echo "No stream.json written"
