name: Fetch YouTube Audio Stream URL with yt-dlp
on:
  repository_dispatch:
    types: [fetch-stream]
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── ADD IT RIGHT HERE ──────────────────────────
      - name: Inject config
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cat > config.js << EOF
          window.__CONFIG__ = {
            PAT: "$GH_PAT",
            OWNER: "mkcarecloud",
            REPO: "yt-proxy",
            BRANCH: "main"
          };
          EOF
          git config user.name "yt-proxy-bot"
          git config user.email "bot@github.com"
          git add config.js
          git diff --staged --quiet || git commit -m "update config"
          git push
      # ───────────────────────────────────────────────

      - name: Search YouTube
        env:
          QUERY: ${{ github.event.client_payload.query }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || 'default' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$QUERY" ]; then
            echo "Error: No query provided"
            exit 1
          fi

          echo "Query: $QUERY"
          echo "Request ID: $REQUEST_ID"

          ENCODED_QUERY=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['QUERY']))")

          RESULT=$(curl -s \
            "https://www.googleapis.com/youtube/v3/search?part=snippet&q=${ENCODED_QUERY}&type=video&videoCategoryId=10&maxResults=10&videoEmbeddable=true&key=$YOUTUBE_API_KEY")

          echo "Search done, checking embeddability..."

          VIDEO_IDS=$(echo "$RESULT" | jq -r '[.items[].id.videoId] | join(",")')
          echo "Candidate IDs: $VIDEO_IDS"

          DETAILS=$(curl -s \
            "https://www.googleapis.com/youtube/v3/videos?part=status,snippet&id=${VIDEO_IDS}&key=$YOUTUBE_API_KEY")

          SELECTED=$(echo "$DETAILS" | jq -r '
            .items[]
            | select(.status.embeddable == true)
            | {
                videoId: .id,
                title: .snippet.title,
                channel: .snippet.channelTitle,
                thumbnail: .snippet.thumbnails.high.url
              }
            | @json
          ' | head -n 1)

          echo "Selected: $SELECTED"

          if [ -z "$SELECTED" ] || [ "$SELECTED" = "null" ]; then
            echo "No truly embeddable video found"
            jq -n \
              --arg q "$QUERY" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, status: "no_video_found", ts: $ts}' \
              > data/stream.json
          else
            VIDEO_ID=$(echo "$SELECTED" | jq -r '.videoId')
            TITLE=$(echo "$SELECTED"    | jq -r '.title')
            THUMBNAIL=$(echo "$SELECTED"| jq -r '.thumbnail')
            CHANNEL=$(echo "$SELECTED"  | jq -r '.channel')

            echo "Embeddable video found: $TITLE ($VIDEO_ID)"

            jq -n \
              --arg q "$QUERY" \
              --arg vid "$VIDEO_ID" \
              --arg tit "$TITLE" \
              --arg thumb "$THUMBNAIL" \
              --arg channel "$CHANNEL" \
              --arg rid "$REQUEST_ID" \
              --argjson ts "$(date +%s)" \
              '{request_id: $rid, query: $q, video_id: $vid, title: $tit, thumbnail: $thumb, channel: $channel, status: "ok", ts: $ts}' \
              > data/stream.json
          fi

      - name: Commit result to repo
        run: |
          git config user.name "yt-proxy-bot"
          git config user.email "bot@github.com"
          git add data/stream.json
          git diff --staged --quiet || git commit -m "stream: ${{ github.event.client_payload.query || 'query' }}"
          git push

      - name: Debug - show final json
        run: cat data/stream.json || echo "No stream.json written"
