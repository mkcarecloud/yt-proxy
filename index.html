<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello World</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- PAT injected by GitHub Actions — never hardcoded -->
    <script src="config.js"></script>
    <style>
        #yt-container {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        #now-playing {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            display: none;
            max-width: 300px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="display">Hello World</div>
    <div id="yt-container">
        <div id="yt-player"></div>
    </div>
    <div id="now-playing">🎵 <span id="now-playing-title"></span></div>

    <script>
        // ────────────────────────────────────────────────
        // CONFIG — loaded from config.js (injected by CI)
        // ────────────────────────────────────────────────
        const PAT        = window.__CONFIG__?.PAT    || '';
        const OWNER      = window.__CONFIG__?.OWNER  || 'mkcarecloud';
        const REPO       = window.__CONFIG__?.REPO   || 'yt-proxy';
        const BRANCH     = window.__CONFIG__?.BRANCH || 'main';
        const EVENT_TYPE = 'fetch-stream';

        // ── sanity check on load ──
        if (!PAT) {
            console.warn('%c[CONFIG] PAT not loaded — config.js missing or not yet generated by Actions', 'color:red;font-weight:bold');
        } else {
            console.log('%c[CONFIG] PAT loaded from config.js ✓', 'color:lime');
        }

        // ────────────────────────────────────────────────
        // STATE
        // ────────────────────────────────────────────────
        let ytPlayer        = null;
        let ytReady         = false;
        let pollingInterval = null;
        let lastVideoId     = null;
        let pendingVideoId  = null;
        let pendingTitle    = null;

        // ────────────────────────────────────────────────
        // YOUTUBE IFRAME API
        // ────────────────────────────────────────────────
        window.onYouTubeIframeAPIReady = function () {
            ytPlayer = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    modestbranding: 1
                },
                events: {
                    onReady: (e) => {
                        ytReady = true;
                        e.target.setVolume(100);
                        console.log('%c[YT] Player ready', 'color:lime');
                        if (pendingVideoId) {
                            playVideo(pendingVideoId, pendingTitle);
                            pendingVideoId = null;
                            pendingTitle   = null;
                        }
                    },
                    onStateChange: (e) => {
                        const states = {
                            '-1': 'unstarted', 0: 'ended',
                             1: 'playing',     2: 'paused',
                             3: 'buffering',   5: 'cued'
                        };
                        console.log('%c[YT] State →', 'color:cyan', states[e.data] || e.data);
                        if (e.data === YT.PlayerState.ENDED) hideToast();
                    },
                    onError: (e) => {
                        console.error('[YT] Player error code:', e.data,
                            e.data === 150 || e.data === 101
                                ? '(embedding blocked — try a different song)'
                                : '');
                        hideToast();
                    }
                }
            });
        };

        // ────────────────────────────────────────────────
        // TOAST HELPERS
        // ────────────────────────────────────────────────
        function showToast(title) {
            const el = document.getElementById('now-playing');
            document.getElementById('now-playing-title').textContent = title;
            el.style.display = 'block';
        }
        function hideToast() {
            document.getElementById('now-playing').style.display = 'none';
        }

        // ────────────────────────────────────────────────
        // VOICE ACTIVATION (Ctrl + Shift + M)
        // ────────────────────────────────────────────────
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous     = false;
        recognition.interimResults = false;
        recognition.lang           = 'en-US';

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'm') {
                e.preventDefault();
                console.log('%c[VA] Listening...', 'color:lime;font-weight:bold');
                recognition.start();
            }
        });

        recognition.onresult = event => {
            const transcript = event.results[0][0].transcript.trim().toLowerCase();
            console.log('%c[VA] Heard →', 'color:cyan', transcript);
            if (transcript.startsWith('play ')) {
                const query = transcript.replace(/^play\s+/i, '').trim();
                if (query) dispatchQuery(query);
            } else {
                console.log('%c[VA] Say: "play <song name>"', 'color:orange');
            }
        };
        recognition.onerror = e => console.error('[VA] Speech error:', e.error);
        recognition.onend   = () => console.log('%c[VA] Listening stopped', 'color:gray');

        // ────────────────────────────────────────────────
        // MANUAL CONSOLE TRIGGER
        // ────────────────────────────────────────────────
        window.playMusic = function (query) {
            if (!query || !query.trim()) {
                console.warn('[VA] Usage: playMusic("song name")');
                return;
            }
            dispatchQuery(query.trim());
        };

        // ────────────────────────────────────────────────
        // DISPATCH TO GITHUB WORKFLOW
        // ────────────────────────────────────────────────
        async function dispatchQuery(query) {
            if (!PAT) {
                console.error('[VA] PAT missing — config.js not loaded yet. Trigger any workflow run first.');
                return;
            }

            const requestId = Date.now().toString();
            console.log('%c[VA] Searching for:', 'color:lime', query);
            showToast('Searching: ' + query + '...');

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${OWNER}/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${PAT}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: EVENT_TYPE,
                        client_payload: { query, request_id: requestId }
                    })
                });

                if (response.ok) {
                    console.log('%c[VA] Workflow dispatched, polling...', 'color:lime');
                    startPolling(requestId);
                } else {
                    console.error('[VA] Dispatch failed:', response.status, await response.text());
                    hideToast();
                }
            } catch (err) {
                console.error('[VA] Dispatch error:', err);
                hideToast();
            }
        }

        // ────────────────────────────────────────────────
        // POLL FOR RESULT
        // ────────────────────────────────────────────────
        function startPolling(expectedRequestId) {
            if (pollingInterval) clearInterval(pollingInterval);
            let attempts      = 0;
            const maxAttempts = 60;

            pollingInterval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(pollingInterval);
                    console.warn('[VA] Timeout: no result after 3 min');
                    hideToast();
                    return;
                }

                try {
                    const res = await fetch(
                        `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/data/stream.json?_=${Date.now()}`
                    );
                    if (!res.ok) return;

                    const data = await res.json();
                    if (data.request_id !== expectedRequestId) return;

                    if (data.status === 'ok' && data.video_id) {
                        clearInterval(pollingInterval);
                        console.log('%c[VA] Got result →', 'color:lime', data.title);
                        playVideo(data.video_id, data.title);
                    } else if (data.status === 'no_video_found') {
                        clearInterval(pollingInterval);
                        console.warn('[VA] No video found for that query');
                        hideToast();
                    }
                } catch (err) {
                    // silent — file not ready yet
                }
            }, 3000);
        }

        // ────────────────────────────────────────────────
        // PLAY VIDEO
        // ────────────────────────────────────────────────
        function playVideo(videoId, title = 'Now playing') {
            if (lastVideoId === videoId) return;
            lastVideoId = videoId;

            if (!ytReady) {
                console.log('%c[YT] Player not ready, queuing...', 'color:orange');
                pendingVideoId = videoId;
                pendingTitle   = title;
                return;
            }

            console.log('%c[YT] Playing:', 'color:lime', title, `(${videoId})`);
            ytPlayer.loadVideoById({ videoId });
            ytPlayer.setVolume(100);
            showToast(title);
        }

        console.log('%cHidden Music Player ready!', 'color:#0f0;font-size:14px');
        console.log('%cPress Ctrl+Shift+M → say "play <song name>"  OR  type: playMusic("song name")', 'color:#0f0');
    </script>
</body>
</html>
